{% extends "store/base.html" %}
{% block title %}Login - FarmOS{% endblock %}
{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <article class="login-card rounded-4 shadow-sm p-5">
                <h2 class="mb-3">Login with mobile number</h2>
                <p class="text-muted mb-4">Enter your number to access your cart, address, and orders.</p>
                <form method="post" class="row g-4">
                    {% csrf_token %}
                    <div class="col-12">{{ form.mobile_number.label_tag }}{{ form.mobile_number }}</div>
                    <div class="col-12">
                        <button class="btn btn-primary rounded-pill w-100" type="submit">Continue</button>
                    </div>
                </form>
            </article>
        </div>
    </div>
</section>
{% endblock %}
