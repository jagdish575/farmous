{% extends "store/base.html" %}
{% block title %}Page Not Found - FarmOS{% endblock %}
{% block content %}
<section class="container py-5">
    <div class="empty-state py-5">
        <div class="display-1 text-muted mb-3">404</div>
        <h1 class="h3 fw-bold">Page not found</h1>
        <p class="text-muted">The page you're looking for doesn't exist or may have been moved.</p>
        <div class="d-flex flex-wrap gap-2 justify-content-center mt-4">
            <a href="{% url 'store:home' %}" class="btn btn-primary rounded-pill">Go to Home</a>
            <a href="{% url 'store:medicine_list' %}" class="btn btn-outline-primary rounded-pill">Browse Medicines</a>
        </div>
    </div>
</section>
{% endblock %}
